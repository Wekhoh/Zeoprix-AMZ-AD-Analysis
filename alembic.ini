# Alembic configuration for amz-ad-tracker.
#
# Usage:
#   alembic revision --autogenerate -m "describe change"
#   alembic upgrade head
#   alembic downgrade -1
#   alembic current
#   alembic history
#
# For existing databases created before Alembic was introduced, stamp them
# at the baseline revision first:
#   alembic stamp 0001_initial_baseline

[alembic]
# Path to migration scripts, relative to repo root
script_location = backend/migrations

# Python template for new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Prepend repo root to sys.path so env.py can import backend.*
prepend_sys_path = .

# Timezone for created_at comments in generated files
timezone = UTC

# Database URL is loaded from backend.config.settings.DATABASE_URL in env.py,
# not from here, so this value is intentionally left as a placeholder.
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# Run ruff on generated migration files so autogenerate output matches repo style
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
